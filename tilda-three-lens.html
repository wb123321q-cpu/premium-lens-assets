<section id="lens-apple-widget" aria-label="Интерактивная премиальная линза">
  <canvas id="lens-apple-canvas"></canvas>
  <div id="lens-apple-status" role="status">Инициализация оптики...</div>
  
  <div class="lens-controls">
    <button class="lens-control is-active" data-coat="green">AR Green (Clear)</button>
    <button class="lens-control" data-coat="blue">Blue Blocker</button>
  </div>
</section>

<style>
  #lens-apple-widget { width: 100%; height: 500px; position: relative; background: #000; overflow: hidden; }
  #lens-apple-canvas { width: 100%; height: 100%; cursor: grab; }
  .lens-controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
  .lens-control { padding: 10px 20px; border-radius: 20px; background: #333; color: #fff; border: none; cursor: pointer; }
  .lens-control.is-active { background: #555; outline: 2px solid #fff; }
</style>

<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

  const container = document.getElementById('lens-apple-widget');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(30, container.clientWidth/container.clientHeight, 0.1, 1000);
  camera.position.z = 5;

  const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('lens-apple-canvas'), antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);

  // Физика материала: максимально приближенная к реальному стеклу
  const lensMat = new THREE.MeshPhysicalMaterial({
    transmission: 0.98,
    roughness: 0.05,
    thickness: 1.5,
    ior: 1.5,
    clearcoat: 1.0,
    clearcoatRoughness: 0.0,
    envMapIntensity: 2.0
  });

  // ЭТО ГЛАВНОЕ: Мы создаем ДВА разных блика и переключаем их прозрачность
  const createFlare = (color) => {
    const geo = new THREE.TorusGeometry(1, 0.1, 16, 100);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0 });
    const mesh = new THREE.Mesh(geo, mat);
    return mesh;
  };

  const greenFlare = createFlare(0x00ff80); // Зеленый AR
  const blueFlare = createFlare(0x4080ff);  // Синий Blue Blocker
  
  scene.add(greenFlare);
  scene.add(blueFlare);
  greenFlare.material.opacity = 1; // По умолчанию зеленый

  // Логика переключения
  document.querySelectorAll('.lens-control').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.lens-control').forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');
      
      const type = btn.dataset.coat;
      greenFlare.material.opacity = type === 'green' ? 1 : 0;
      blueFlare.material.opacity = type === 'blue' ? 1 : 0;
    };
  });

  // Рендер петля
  function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
  }
  animate();
</script>
