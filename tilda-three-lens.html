<section id="lens-three-widget" aria-label="Интерактивная очковая линза">
  <canvas id="lens-three-canvas"></canvas>
  <div id="lens-three-status" role="status">Загрузка линзы…</div>
</section>

<style>
  #lens-three-widget {
    position: relative;
    width: 100%;
    height: min(78vw, 780px);
    min-height: 440px;
    overflow: hidden;
    background: #f7f8fb;
  }
  #lens-three-canvas { display: block; width: 100%; height: 100%; touch-action: none; }
  #lens-three-status {
    position: absolute; inset: 0; display: grid; place-items: center;
    color: rgba(25,32,46,.55); font: 14px/1.4 Arial, sans-serif;
    letter-spacing: .04em; pointer-events: none;
  }
  @media (max-width: 640px) {
    #lens-three-widget { height: 105vw; min-height: 390px; }
  }
</style>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.1/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
  import { RectAreaLightUniformsLib } from 'three/addons/lights/RectAreaLightUniformsLib.js';

  const MODEL_URL = 'https://raw.githubusercontent.com/wb123321q-cpu/premium-lens-assets/main/3Dlens.glb';
  const container = document.getElementById('lens-three-widget');
  const canvas = document.getElementById('lens-three-canvas');
  const status = document.getElementById('lens-three-status');

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf7f8fb);
  const camera = new THREE.PerspectiveCamera(35, 1, 0.01, 100);
  camera.position.set(0, -4.7, 3.2);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.35;
  RectAreaLightUniformsLib.init();

  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
  pmrem.dispose();

  const target = new THREE.Vector3(0, 0, 0);
  camera.lookAt(target);

  // Студийный свет и цветные остаточные рефлексы.
  const key = new THREE.RectAreaLight(0xffffff, 14, 4.8, 2.0);
  key.position.set(0, -1.1, 4.4); key.lookAt(0, 0, 0); scene.add(key);
  const green = new THREE.RectAreaLight(0x00e9a8, 5, 2.1, 1.7);
  green.position.set(-3.2, 1.3, 1.2); green.lookAt(0, 0, 0); scene.add(green);
  const violet = new THREE.RectAreaLight(0x715cff, 5, 2.0, 1.8);
  violet.position.set(3.1, -1.0, 1.5); violet.lookAt(0, 0, 0); scene.add(violet);
  scene.add(new THREE.HemisphereLight(0x8ca7ff, 0x05070a, 1.2));

  const glass = new THREE.MeshPhysicalMaterial({
    color: 0xffffff, roughness: 0.012, metalness: 0,
    transmission: 1, thickness: 0.32, ior: 1.6,
    clearcoat: 0.5, clearcoatRoughness: 0.01,
    envMapIntensity: 2.5, transparent: true, opacity: 1,
    iridescence: 0.12, iridescenceIOR: 1.35,
    iridescenceThicknessRange: [180, 420]
  });
  const pedestalMaterial = new THREE.MeshStandardMaterial({
    color: 0x050812, roughness: 0.48, metalness: 0.1
  });

  // Собственный аккуратный подиум; модель из Blender используется только как линза.
  // Белый фон без подиума: форма линзы читается по краю и отражениям.

  const spin = new THREE.Group();
  spin.rotation.x = THREE.MathUtils.degToRad(8);
  scene.add(spin);

  const loader = new GLTFLoader();
  loader.setCrossOrigin('anonymous');
  loader.load(MODEL_URL, (gltf) => {
    const model = gltf.scene;
    const lensMeshes = [];
    model.traverse((object) => {
      if (!object.isMesh) return;
      const name = `${object.name} ${object.parent?.name || ''}`.toLowerCase();
      if (/lens|линз/.test(name)) lensMeshes.push(object);
    });

    // В этом GLB подиум и линза — отдельные меши. Берём размер только линзы.
    const visibleMeshes = lensMeshes.length
      ? lensMeshes
      : (() => { const all = []; model.traverse(o => { if (o.isMesh) all.push(o); }); return all; })();
    const lensBox = new THREE.Box3();
    visibleMeshes.forEach(mesh => lensBox.expandByObject(mesh));
    const lensSize = lensBox.getSize(new THREE.Vector3());
    const lensCenter = lensBox.getCenter(new THREE.Vector3());
    const scale = 2.7 / Math.max(lensSize.x, lensSize.y, lensSize.z);
    model.scale.setScalar(scale);
    model.position.set(-lensCenter.x * scale, -lensCenter.y * scale, -lensCenter.z * scale);

    model.traverse((object) => {
      if (!object.isMesh) return;
      const isLens = visibleMeshes.includes(object);
      object.visible = isLens;
      if (isLens) {
        object.material = glass;
        object.castShadow = true;
      }
    });

    spin.add(model);
    status.style.display = 'none';
  }, undefined, (error) => {
    console.error(error);
    status.textContent = 'Не удалось загрузить 3D-модель.';
  });

  function resize() {
    const { width, height } = container.getBoundingClientRect();
    renderer.setSize(width, height, false);
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
  }
  new ResizeObserver(resize).observe(container);
  resize();

  // Автовращение плюс мягкое управление мышью/пальцем.
  let drag = false, lastX = 0, userTurn = 0;
  canvas.addEventListener('pointerdown', (event) => {
    drag = true; lastX = event.clientX; canvas.setPointerCapture(event.pointerId);
  });
  canvas.addEventListener('pointermove', (event) => {
    if (!drag) return;
    userTurn += (event.clientX - lastX) * 0.008;
    lastX = event.clientX;
  });
  canvas.addEventListener('pointerup', () => { drag = false; });
  canvas.addEventListener('pointercancel', () => { drag = false; });

  function render(time) {
    spin.rotation.z = time * 0.000785 + userTurn; // один оборот примерно за 8 секунд
    renderer.render(scene, camera);
    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);
</script>
