<section id="lens-white-widget" aria-label="Интерактивная премиальная линза">
  <canvas id="lens-white-canvas"></canvas>
  
  <div class="apple-hud top-left">
    <div class="hud-title">MIR OPTIKI PRO</div>
    <div class="hud-subtitle">Ultra-Clear Polymer</div>
  </div>
  <div class="apple-hud bottom-right">
    <div class="hud-spec">AR COATING</div>
    <div class="hud-spec-sub">MULTI-LAYER PROTECTION</div>
  </div>
  <div class="apple-hint" id="drag-hint">Touch & Drag</div>
  
  <div id="lens-white-status" role="status">Загрузка оптики…</div>
</section>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

  #lens-white-widget {
    position: relative;
    width: 100%;
    height: min(85vw, 800px);
    min-height: 500px;
    overflow: hidden;
    background: #ffffff; /* Абсолютно белый фон */
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    color: #000000; /* Темный текст */
    -webkit-font-smoothing: antialiased;
  }
  #lens-white-canvas { 
    display: block; width: 100%; height: 100%; 
    touch-action: none; cursor: grab;
  }
  #lens-white-canvas:active { cursor: grabbing; }
  
  .apple-hud {
    position: absolute; pointer-events: none; z-index: 10;
  }
  .top-left { top: 40px; left: 40px; }
  .bottom-right { bottom: 40px; right: 40px; text-align: right; }
  
  .hud-title {
    font-size: 15px; font-weight: 500; letter-spacing: 0.15em;
    color: rgba(0, 0, 0, 0.9); margin-bottom: 4px;
  }
  .hud-subtitle {
    font-size: 12px; font-weight: 400; letter-spacing: 0.05em;
    color: rgba(0, 0, 0, 0.5); text-transform: uppercase;
  }
  .hud-spec {
    font-size: 22px; font-weight: 300; letter-spacing: 0.02em;
    color: rgba(0, 0, 0, 0.9); margin-bottom: 2px;
  }
  .hud-spec-sub {
    font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
    color: rgba(0, 0, 0, 0.4);
  }

  .apple-hint {
    position: absolute; bottom: 40px; left: 50%;
    transform: translateX(-50%); padding: 8px 16px;
    background: rgba(0, 0, 0, 0.05);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(0, 0, 0, 0.1); border-radius: 30px;
    font-size: 12px; font-weight: 500; letter-spacing: 0.05em;
    color: rgba(0, 0, 0, 0.6); pointer-events: none;
    transition: opacity 0.5s ease; animation: pulse 3s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
  }

  #lens-white-status {
    position: absolute; inset: 0; display: grid; place-items: center;
    font-size: 13px; font-weight: 400; letter-spacing: 0.1em;
    text-transform: uppercase; color: rgba(0, 0, 0, 0.4); pointer-events: none;
  }

  @media (max-width: 640px) {
    .top-left { top: 24px; left: 24px; }
    .bottom-right { bottom: 80px; right: 24px; }
    .apple-hint { bottom: 30px; }
  }
</style>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.1/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

  const MODEL_URL = 'https://raw.githubusercontent.com/wb123321q-cpu/premium-lens-assets/main/3Dlens.glb';
  const container = document.getElementById('lens-white-widget');
  const canvas = document.getElementById('lens-white-canvas');
  const status = document.getElementById('lens-white-status');
  const dragHint = document.getElementById('drag-hint');

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff); // Белый фон сцены
  
  const camera = new THREE.PerspectiveCamera(28, 1, 0.01, 100);
  camera.position.set(0, 0, 6.0); // Камера смотрит прямо

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0; 

  // ==========================================
  // СТУДИЯ ДЛЯ БЕЛОГО ФОНА (С черными флагами)
  // ==========================================
  const envScene = new THREE.Scene();
  envScene.background = new THREE.Color(0xffffff); // Окружение белое
  const planeGeo = new THREE.PlaneGeometry(20, 20);
  
  // ЧЕРНЫЕ ФЛАГИ по бокам (создают темный контур стекла на белом фоне)
  const blackMat = new THREE.MeshBasicMaterial({color: 0x050505});
  const leftFlag = new THREE.Mesh(planeGeo, blackMat);
  leftFlag.position.set(-10, 0, 2); leftFlag.lookAt(0,0,0); envScene.add(leftFlag);
  
  const rightFlag = new THREE.Mesh(planeGeo, blackMat);
  rightFlag.position.set(10, 0, 2); rightFlag.lookAt(0,0,0); envScene.add(rightFlag);

  // Цветные антиблики
  const arGreenLight = new THREE.Mesh(planeGeo, new THREE.MeshBasicMaterial({color: 0x00ffaa}));
  arGreenLight.position.set(-5, 8, 5); arGreenLight.lookAt(0,0,0); envScene.add(arGreenLight);

  const arPurpleLight = new THREE.Mesh(planeGeo, new THREE.MeshBasicMaterial({color: 0x5500ff}));
  arPurpleLight.position.set(5, -8, 5); arPurpleLight.lookAt(0,0,0); envScene.add(arPurpleLight);

  // Генерация HDRI
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  scene.environment = pmrem.fromScene(envScene).texture;

  // Базовый мягкий свет
  scene.add(new THREE.AmbientLight(0xffffff, 1.0));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
  dirLight.position.set(0, 5, 5); scene.add(dirLight);

  // ==========================================
  // МАТЕРИАЛ СТЕКЛА ДЛЯ БЕЛОГО ФОНА
  // ==========================================
  const glassMaterial = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    transmission: 1.0,     
    opacity: 1.0,
    transparent: true,
    roughness: 0.0,        
    metalness: 0.05,       
    ior: 1.52,             
    thickness: 0.8,        // Делаем чуть толще для лучшего преломления контуров
    attenuationColor: new THREE.Color(0xffffff), 
    attenuationDistance: 2.0, 
    clearcoat: 1.0,        
    clearcoatRoughness: 0.0,
    dispersion: 0.02,     
    envMapIntensity: 1.5,  
    iridescence: 0.8,      
    iridescenceIOR: 1.4,
    iridescenceThicknessRange: [350, 450] 
  });

  const floatGroup = new THREE.Group(); 
  const spinGroup = new THREE.Group();  
  floatGroup.add(spinGroup);
  scene.add(floatGroup);

  const loader = new GLTFLoader();
  loader.setCrossOrigin('anonymous');
  loader.load(MODEL_URL, (gltf) => {
    const model = gltf.scene;
    const lensMeshes = [];
    
    model.traverse((object) => {
      if (!object.isMesh) return;
      const name = `${object.name} ${object.parent?.name || ''}`.toLowerCase();
      if (/lens|линз/.test(name)) lensMeshes.push(object);
    });

    const visibleMeshes = lensMeshes.length ? lensMeshes : (() => { const all = []; model.traverse(o => { if (o.isMesh) all.push(o); }); return all; })();
    const lensBox = new THREE.Box3();
    visibleMeshes.forEach(mesh => lensBox.expandByObject(mesh));
    const lensSize = lensBox.getSize(new THREE.Vector3());
    const lensCenter = lensBox.getCenter(new THREE.Vector3());
    
    const scale = 2.4 / Math.max(lensSize.x, lensSize.y, lensSize.z);
    model.scale.setScalar(scale);
    model.position.set(-lensCenter.x * scale, -lensCenter.y * scale, -lensCenter.z * scale);

    model.traverse((object) => {
      if (!object.isMesh) return;
      const isLens = visibleMeshes.includes(object);
      object.visible = isLens;
      if (isLens) {
        object.material = glassMaterial;
      }
    });

    // ИЗНАЧАЛЬНО ВЕРТИКАЛЬНО (Смотрит прямо на нас)
    spinGroup.rotation.x = 0;
    spinGroup.rotation.y = 0;

    spinGroup.add(model);
    status.style.display = 'none';
  }, undefined, (error) => {
    console.error(error);
    status.textContent = 'Ошибка загрузки модуля.';
  });

  function resize() {
    const { width, height } = container.getBoundingClientRect();
    renderer.setSize(width, height, false);
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
  }
  new ResizeObserver(resize).observe(container);
  resize();

  // --- ЛОГИКА ВРАЩЕНИЯ И ОСТАНОВКИ ПРИ НАВЕДЕНИИ ---
  let isDragging = false, isHovered = false;
  let lastPointerX = 0, lastPointerY = 0;
  
  // Текущая цель вращения
  let targetRotationX = 0;
  let targetRotationY = 0;

  // Отслеживаем наведение мыши/пальца на блок
  container.addEventListener('pointerenter', () => { isHovered = true; });
  container.addEventListener('pointerleave', () => { isHovered = false; isDragging = false; });

  canvas.addEventListener('pointerdown', (event) => {
    isDragging = true; 
    lastPointerX = event.clientX; lastPointerY = event.clientY;
    canvas.setPointerCapture(event.pointerId);
    dragHint.style.opacity = '0'; 
  });
  
  canvas.addEventListener('pointermove', (event) => {
    if (!isDragging) return;
    targetRotationY += (event.clientX - lastPointerX) * 0.006;
    targetRotationX += (event.clientY - lastPointerY) * 0.006; 
    targetRotationX = Math.max(-Math.PI/4, Math.min(Math.PI/4, targetRotationX)); // Ограничение наклона
    lastPointerX = event.clientX; lastPointerY = event.clientY;
  });
  
  canvas.addEventListener('pointerup', () => { isDragging = false; });
  canvas.addEventListener('pointercancel', () => { isDragging = false; });

  const clock = new THREE.Clock();

  function render() {
    const elapsedTime = clock.getElapsedTime();

    // Если не навели мышку и не тащим, крутим ВЛЕВО
    if (!isHovered && !isDragging) {
      targetRotationY -= 0.005; // Минус = вращение влево
    }
    
    // Плавное применение вращения (Инерция)
    spinGroup.rotation.y += (targetRotationY - spinGroup.rotation.y) * 0.08;
    spinGroup.rotation.x += (targetRotationX - spinGroup.rotation.x) * 0.08;

    // Очень легкое дыхание (левитация)
    floatGroup.position.y = Math.sin(elapsedTime * 1.5) * 0.05;

    renderer.render(scene, camera);
    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);
</script>
