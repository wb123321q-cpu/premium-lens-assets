<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Premium Lens</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; background: #000; overflow: hidden; }
    #lens-widget, #lens-canvas { width: 100%; height: 100%; display: block; background: #000; }
    #lens-canvas { cursor: grab; touch-action: none; }
    #lens-canvas:active { cursor: grabbing; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <main id="lens-widget" aria-label="Интерактивная очковая линза">
    <canvas id="lens-canvas"></canvas>
  </main>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const MODEL_URL = 'https://raw.githubusercontent.com/wb123321q-cpu/premium-lens-assets/main/3Dlens.glb';
    const canvas = document.getElementById('lens-canvas');
    const container = document.getElementById('lens-widget');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(28, 1, 0.01, 100);
    camera.position.set(0, 0, 5.8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.08;

    // Невидимая чёрная студия с одним узким белым стрип-лайтом.
    // Карта PMREM рассчитывается один раз и не нагружает кадры анимации.
    const envScene = new THREE.Scene();
    envScene.background = new THREE.Color(0x000000);
    const strip = new THREE.Mesh(
      new THREE.PlaneGeometry(0.34, 8.0),
      new THREE.MeshBasicMaterial({ color: 0xffffff, toneMapped: false })
    );
    strip.position.set(-3.0, 0.3, 2.2);
    strip.lookAt(0, 0, 0);
    envScene.add(strip);

    const pmrem = new THREE.PMREMGenerator(renderer);
    const environment = pmrem.fromScene(envScene, 0.02).texture;
    pmrem.dispose();
    scene.environment = environment;

    const glass = new THREE.MeshPhysicalMaterial({
      color: 0xffffff,
      transmission: 1.0,
      roughness: 0.0,
      metalness: 0.0,
      ior: 1.6,
      thickness: 0.16,
      attenuationColor: new THREE.Color(0xf4f8ff),
      attenuationDistance: 1.35,
      clearcoat: 0.45,
      clearcoatRoughness: 0.0,
      dispersion: 0.014,
      envMapIntensity: 0.95
    });

    // Ориентация: экспорт из Blender лежит в X/Z, поэтому разворачиваем
    // линзу лицом к камере. Последующее вращение идёт только вокруг Y.
    const presentation = new THREE.Group();
    presentation.rotation.x = Math.PI / 2;
    scene.add(presentation);

    const spin = new THREE.Group();
    presentation.add(spin);

    const loader = new GLTFLoader();
    loader.setCrossOrigin('anonymous');
    loader.load(MODEL_URL, (gltf) => {
      const model = gltf.scene;
      const lensMeshes = [];
      model.traverse((object) => {
        if (!object.isMesh) return;
        const name = `${object.name} ${object.parent?.name || ''}`.toLowerCase();
        if (/lens|линз/.test(name)) lensMeshes.push(object);
      });

      const meshes = lensMeshes.length ? lensMeshes : [];
      if (!meshes.length) throw new Error('Меш линзы не найден в GLB.');

      const bounds = new THREE.Box3();
      meshes.forEach(mesh => bounds.expandByObject(mesh));
      const size = bounds.getSize(new THREE.Vector3());
      const center = bounds.getCenter(new THREE.Vector3());
      const scale = 3.05 / Math.max(size.x, size.y, size.z);
      model.scale.setScalar(scale);
      model.position.set(-center.x * scale, -center.y * scale, -center.z * scale);

      model.traverse((object) => {
        if (!object.isMesh) return;
        const isLens = meshes.includes(object);
        object.visible = isLens;
        if (isLens) object.material = glass;
      });
      spin.add(model);
    }, undefined, (error) => console.error('GLB load error:', error));

    function resize() {
      const { width, height } = container.getBoundingClientRect();
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }
    new ResizeObserver(resize).observe(container);
    resize();

    // Витринное автодвижение; курсор над виджетом ставит его на паузу.
    let paused = false;
    let dragging = false;
    let lastX = 0;
    let targetY = 0;
    let velocity = 0;
    const AUTO_SPEED = -0.00018;

    canvas.addEventListener('pointerenter', () => { paused = true; });
    canvas.addEventListener('pointerleave', () => {
      if (!dragging) paused = false;
    });
    canvas.addEventListener('pointerdown', (event) => {
      dragging = true;
      paused = true;
      velocity = 0;
      lastX = event.clientX;
      canvas.setPointerCapture(event.pointerId);
    });
    canvas.addEventListener('pointermove', (event) => {
      if (!dragging) return;
      const delta = event.clientX - lastX;
      velocity = delta * 0.0028;
      targetY += velocity;
      lastX = event.clientX;
    });
    function releasePointer() {
      dragging = false;
      // При наведении автоповорот не включается — виджет остаётся под контролем пользователя.
    }
    canvas.addEventListener('pointerup', releasePointer);
    canvas.addEventListener('pointercancel', releasePointer);

    const clock = new THREE.Clock();
    function animate() {
      const dt = Math.min(clock.getDelta(), 0.05);
      if (!paused && !dragging) targetY += AUTO_SPEED * (dt * 1000);
      if (!dragging) {
        targetY += velocity;
        velocity *= 0.93; // кинетическое плавное затухание после свайпа
      }
      spin.rotation.y += (targetY - spin.rotation.y) * 0.075;
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
