<section id="lens-champagne-widget" aria-label="Премиальная линза">
  <canvas id="lens-champagne-canvas"></canvas>
  
  <div class="apple-hud top-left">
    <div class="hud-title">MIR OPTIKI PRO</div>
    <div class="hud-subtitle">Premium AR Coating</div>
  </div>
  <div class="apple-hud bottom-right">
    <div class="hud-spec">0.00 D</div>
    <div class="hud-spec-sub">HIGH-INDEX 1.60</div>
  </div>
  <div class="apple-hint" id="drag-hint">Touch & Drag</div>
  
  <div id="lens-champagne-status" role="status">Загрузка оптики…</div>
</section>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

  #lens-champagne-widget {
    position: relative;
    width: 100%;
    height: min(85vw, 800px);
    min-height: 500px;
    overflow: hidden;
    background: #F9F6F0; /* Фирменный золотистый/шампань фон */
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    color: #1a1a1a;
    -webkit-font-smoothing: antialiased;
  }
  #lens-champagne-canvas { 
    display: block; width: 100%; height: 100%; 
    touch-action: none; cursor: grab;
  }
  #lens-champagne-canvas:active { cursor: grabbing; }
  
  .apple-hud {
    position: absolute; pointer-events: none; z-index: 10;
  }
  .top-left { top: 40px; left: 40px; }
  .bottom-right { bottom: 40px; right: 40px; text-align: right; }
  
  .hud-title {
    font-size: 15px; font-weight: 500; letter-spacing: 0.15em;
    color: rgba(0, 0, 0, 0.9); margin-bottom: 4px;
  }
  .hud-subtitle {
    font-size: 12px; font-weight: 400; letter-spacing: 0.05em;
    color: rgba(0, 0, 0, 0.5); text-transform: uppercase;
  }
  .hud-spec {
    font-size: 22px; font-weight: 300; letter-spacing: 0.02em;
    color: rgba(0, 0, 0, 0.9); margin-bottom: 2px;
  }
  .hud-spec-sub {
    font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
    color: rgba(0, 0, 0, 0.4);
  }

  .apple-hint {
    position: absolute; bottom: 40px; left: 50%;
    transform: translateX(-50%); padding: 8px 16px;
    background: rgba(0, 0, 0, 0.04);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(0, 0, 0, 0.08); border-radius: 30px;
    font-size: 12px; font-weight: 500; letter-spacing: 0.05em;
    color: rgba(0, 0, 0, 0.6); pointer-events: none;
    transition: opacity 0.5s ease; animation: pulse 3s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
  }

  #lens-champagne-status {
    position: absolute; inset: 0; display: grid; place-items: center;
    font-size: 13px; font-weight: 400; letter-spacing: 0.1em;
    text-transform: uppercase; color: rgba(0, 0, 0, 0.4); pointer-events: none;
  }

  @media (max-width: 640px) {
    .top-left { top: 24px; left: 24px; }
    .bottom-right { bottom: 80px; right: 24px; }
    .apple-hint { bottom: 30px; }
  }
</style>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.1/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

  const MODEL_URL = 'https://raw.githubusercontent.com/wb123321q-cpu/premium-lens-assets/main/3Dlens.glb';
  const container = document.getElementById('lens-champagne-widget');
  const canvas = document.getElementById('lens-champagne-canvas');
  const status = document.getElementById('lens-champagne-status');
  const dragHint = document.getElementById('drag-hint');

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xF9F6F0); // Теплый кремовый/золотистый фон
  
  const camera = new THREE.PerspectiveCamera(28, 1, 0.01, 100);
  camera.position.set(0, 0, 6.5); 

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0; 
  renderer.shadowMap.enabled = true; // Включаем тени
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  // ==========================================
  // СТУДИЯ ОТРАЖЕНИЙ: ТЕМНЫЕ КОНТУРЫ + ЯРКИЙ БЛИК
  // ==========================================
  const envScene = new THREE.Scene();
  envScene.background = new THREE.Color(0xF9F6F0);
  const planeGeo = new THREE.PlaneGeometry(20, 20);
  
  // Создаем черные панели по краям. Они дадут стеклу темный ободок.
  const darkMat = new THREE.MeshBasicMaterial({color: 0x0a0a0a});
  const leftDark = new THREE.Mesh(planeGeo, darkMat);
  leftDark.position.set(-10, 0, 0); leftDark.lookAt(0,0,0); envScene.add(leftDark);
  
  const rightDark = new THREE.Mesh(planeGeo, darkMat);
  rightDark.position.set(10, 0, 0); rightDark.lookAt(0,0,0); envScene.add(rightDark);

  // Яркий изумрудный антиблик (наложен поверх темного фона, чтобы сиять)
  const arGreenLight = new THREE.Mesh(new THREE.PlaneGeometry(5, 20), new THREE.MeshBasicMaterial({color: 0x00ffa2}));
  arGreenLight.position.set(-8, 5, 6); arGreenLight.lookAt(0,0,0); envScene.add(arGreenLight);

  // Фиолетово-синий контрастный блик
  const arPurpleLight = new THREE.Mesh(new THREE.PlaneGeometry(5, 20), new THREE.MeshBasicMaterial({color: 0x4400ff}));
  arPurpleLight.position.set(8, -5, 6); arPurpleLight.lookAt(0,0,0); envScene.add(arPurpleLight);

  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  scene.environment = pmrem.fromScene(envScene).texture;

  // Базовый свет для сцены
  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  
  // Направленный свет для создания мягкой тени под линзой
  const shadowLight = new THREE.DirectionalLight(0xffffff, 1.2);
  shadowLight.position.set(0, 5, 2);
  shadowLight.castShadow = true;
  shadowLight.shadow.mapSize.width = 1024;
  shadowLight.shadow.mapSize.height = 1024;
  shadowLight.shadow.camera.near = 0.5;
  shadowLight.shadow.camera.far = 15;
  shadowLight.shadow.bias = -0.001;
  scene.add(shadowLight);

  // Невидимый пол для приема тени
  const floorMat = new THREE.ShadowMaterial({ opacity: 0.08 }); // Очень мягкая серая тень
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -1.5;
  floor.receiveShadow = true;
  scene.add(floor);

  // ==========================================
  // МАТЕРИАЛ: НЕВИДИМОЕ СТЕКЛО С ВИДИМЫМ БЛИКОМ
  // ==========================================
  const glassMaterial = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    transmission: 1.0,     
    transparent: true,
    opacity: 1.0,
    roughness: 0.0,        
    metalness: 0.1,       
    ior: 1.52,             
    thickness: 0.15,       // Умеренная толщина для аккуратного края
    attenuationColor: new THREE.Color(0xffffff), 
    attenuationDistance: 10.0, 
    clearcoat: 1.0,        
    clearcoatRoughness: 0.0,
    dispersion: 0.01,     
    envMapIntensity: 2.0,  // Сильно тянет отражения из envScene
    iridescence: 0.3,      // Приглушенная общая радуга, акцент на зеленых лампах
    iridescenceIOR: 1.4,
    iridescenceThicknessRange: [200, 400] 
  });

  const floatGroup = new THREE.Group(); 
  const spinGroup = new THREE.Group();  
  floatGroup.add(spinGroup);
  scene.add(floatGroup);

  const loader = new GLTFLoader();
  loader.setCrossOrigin('anonymous');
  loader.load(MODEL_URL, (gltf) => {
    const model = gltf.scene;
    const lensMeshes = [];
    
    model.traverse((object) => {
      if (!object.isMesh) return;
      const name = `${object.name} ${object.parent?.name || ''}`.toLowerCase();
      if (/lens|линз/.test(name)) lensMeshes.push(object);
    });

    const visibleMeshes = lensMeshes.length ? lensMeshes : (() => { const all = []; model.traverse(o => { if (o.isMesh) all.push(o); }); return all; })();
    const lensBox = new THREE.Box3();
    visibleMeshes.forEach(mesh => lensBox.expandByObject(mesh));
    const lensSize = lensBox.getSize(new THREE.Vector3());
    const lensCenter = lensBox.getCenter(new THREE.Vector3());
    
    const scale = 2.4 / Math.max(lensSize.x, lensSize.y, lensSize.z);
    model.scale.setScalar(scale);
    model.position.set(-lensCenter.x * scale, -lensCenter.y * scale, -lensCenter.z * scale);

    model.traverse((object) => {
      if (!object.isMesh) return;
      const isLens = visibleMeshes.includes(object);
      object.visible = isLens;
      if (isLens) {
        object.material = glassMaterial;
        object.castShadow = true; // Линза отбрасывает тень
      }
    });

    // ИЗНАЧАЛЬНО ВЕРТИКАЛЬНО
    spinGroup.rotation.x = 0;
    spinGroup.rotation.y = 0;

    spinGroup.add(model);
    status.style.display = 'none';
  }, undefined, (error) => {
    console.error(error);
    status.textContent = 'Ошибка загрузки модуля.';
  });

  function resize() {
    const { width, height } = container.getBoundingClientRect();
    renderer.setSize(width, height, false);
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
  }
  new ResizeObserver(resize).observe(container);
  resize();

  // --- ЛОГИКА ВРАЩЕНИЯ И ОСТАНОВКИ ПРИ НАВЕДЕНИИ ---
  let isDragging = false, isHovered = false;
  let lastPointerX = 0, lastPointerY = 0;
  
  let targetRotationX = 0;
  let targetRotationY = 0;

  container.addEventListener('pointerenter', () => { isHovered = true; });
  container.addEventListener('pointerleave', () => { isHovered = false; isDragging = false; });

  canvas.addEventListener('pointerdown', (event) => {
    isDragging = true; 
    lastPointerX = event.clientX; lastPointerY = event.clientY;
    canvas.setPointerCapture(event.pointerId);
    dragHint.style.opacity = '0'; 
  });
  
  canvas.addEventListener('pointermove', (event) => {
    if (!isDragging) return;
    targetRotationY += (event.clientX - lastPointerX) * 0.006;
    targetRotationX += (event.clientY - lastPointerY) * 0.006; 
    targetRotationX = Math.max(-Math.PI/4, Math.min(Math.PI/4, targetRotationX));
    lastPointerX = event.clientX; lastPointerY = event.clientY;
  });
  
  canvas.addEventListener('pointerup', () => { isDragging = false; });
  canvas.addEventListener('pointercancel', () => { isDragging = false; });

  const clock = new THREE.Clock();

  function render() {
    const elapsedTime = clock.getElapsedTime();

    // Крутим ВЛЕВО, если нет взаимодействия
    if (!isHovered && !isDragging) {
      targetRotationY -= 0.005; 
    }
    
    // Плавная инерция
    spinGroup.rotation.y += (targetRotationY - spinGroup.rotation.y) * 0.08;
    spinGroup.rotation.x += (targetRotationX - spinGroup.rotation.x) * 0.08;

    // Мягкое дыхание по вертикали
    floatGroup.position.y = Math.sin(elapsedTime * 1.5) * 0.05;

    renderer.render(scene, camera);
    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);
</script>
