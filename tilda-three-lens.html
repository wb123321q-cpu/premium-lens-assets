<section id="lens-apple-widget" aria-label="Интерактивная премиальная линза">
  <canvas id="lens-apple-canvas"></canvas>

  <div class="apple-hud top-left">
    <div class="hud-title">MIR OPTIKI PRO</div>
    <div class="hud-subtitle">Ultra-Clear Polymer</div>
  </div>
  <div class="apple-hud bottom-right">
    <div class="hud-spec">AR COATING</div>
    <div class="hud-spec-sub">MULTI-LAYER PROTECTION</div>
  </div>
  <div class="apple-hint" id="drag-hint">Touch &amp; Drag</div>

  <div class="lens-controls" aria-label="Выбор покрытия линзы">
    <div class="lens-controls__primary" role="group" aria-label="Тип покрытия">
      <button class="lens-control is-active" type="button" data-lens-mode="clear" aria-pressed="true">Прозрачные</button>
      <button class="lens-control" type="button" data-lens-mode="blue" aria-pressed="false">Blue Blocker</button>
      <button class="lens-control" type="button" data-lens-mode="photo-clear" aria-pressed="false" aria-controls="photochrome-controls">Фотохром</button>
    </div>
    <div class="lens-controls__photochrome" id="photochrome-controls" role="group" aria-label="Оттенок фотохромной линзы" aria-hidden="true">
      <button class="lens-control lens-control--compact is-active" type="button" data-lens-mode="photo-clear" aria-pressed="true">Прозрачный</button>
      <button class="lens-control lens-control--compact" type="button" data-lens-mode="photo-gray" aria-pressed="false">Серый</button>
      <button class="lens-control lens-control--compact" type="button" data-lens-mode="photo-brown" aria-pressed="false">Коричневый</button>
    </div>
  </div>

  <div id="lens-apple-status" role="status">Загрузка оптики…</div>
</section>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

  #lens-apple-widget {
    position: relative;
    width: 100%;
    height: min(85vw, 800px);
    min-height: 500px;
    overflow: hidden;
    background: #1f2126; /* Премиальный графит */
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    color: #ffffff;
    -webkit-font-smoothing: antialiased;
  }

  #lens-apple-canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
    cursor: grab;
  }

  #lens-apple-canvas:active { cursor: grabbing; }

  .apple-hud {
    position: absolute;
    z-index: 10;
    pointer-events: none;
  }

  .top-left { top: 40px; left: 40px; }
  .bottom-right { right: 40px; bottom: 108px; text-align: right; }

  .hud-title {
    margin-bottom: 4px;
    color: rgba(255, 255, 255, 0.95);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.15em;
  }

  .hud-subtitle {
    color: rgba(255, 255, 255, 0.5);
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .hud-spec {
    margin-bottom: 2px;
    color: rgba(255, 255, 255, 0.95);
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  .hud-spec-sub {
    color: rgba(255, 255, 255, 0.4);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.1em;
  }

  .apple-hint {
    position: absolute;
    z-index: 10;
    bottom: 108px;
    left: 50%;
    padding: 8px 16px;
    color: rgba(255, 255, 255, 0.7);
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 30px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.05em;
    pointer-events: none;
    transform: translateX(-50%);
    transition: opacity 0.5s ease;
    animation: pulse 3s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
  }

  .lens-controls {
    position: absolute;
    z-index: 20;
    bottom: 30px;
    left: 50%;
    display: grid;
    width: min(100% - 32px, 510px);
    gap: 9px;
    pointer-events: auto;
    transform: translateX(-50%);
  }

  .lens-controls__primary,
  .lens-controls__photochrome {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }

  .lens-controls__photochrome {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    pointer-events: none;
    transform: translateY(-5px);
    transition: max-height 420ms ease, opacity 320ms ease, transform 420ms ease;
  }

  .lens-controls__photochrome.is-visible {
    max-height: 48px;
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .lens-control {
    appearance: none;
    min-height: 38px;
    padding: 9px 15px;
    color: rgba(255, 255, 255, 0.88);
    background: rgba(255, 255, 255, 0.055);
    border: 1px solid rgba(255, 255, 255, 0.19);
    border-radius: 999px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(14px) saturate(125%);
    -webkit-backdrop-filter: blur(14px) saturate(125%);
    cursor: pointer;
    font: inherit;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.04em;
    line-height: 1;
    white-space: nowrap;
    transition: background 420ms ease, border-color 420ms ease, box-shadow 420ms ease, color 420ms ease, transform 300ms ease;
  }

  .lens-control:hover {
    color: #ffffff;
    background: rgba(255, 255, 255, 0.09);
    border-color: rgba(255, 255, 255, 0.31);
  }

  .lens-control:focus-visible {
    outline: 2px solid rgba(255, 255, 255, 0.75);
    outline-offset: 3px;
  }

  .lens-control:active { transform: scale(0.98); }

  .lens-control.is-active {
    color: #ffffff;
    background: rgba(255, 255, 255, 0.14);
    border-color: rgba(255, 255, 255, 0.45);
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.17);
  }

  .lens-control--compact {
    min-height: 32px;
    padding: 7px 13px;
    font-size: 10px;
  }

  #lens-apple-status {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    color: rgba(255, 255, 255, 0.4);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.1em;
    pointer-events: none;
    text-transform: uppercase;
  }

  @media (max-width: 640px) {
    #lens-apple-widget {
      height: max(112vw, 500px);
    }

    .top-left { top: 24px; left: 24px; }
    .bottom-right { right: 24px; bottom: 118px; }
    .apple-hint { bottom: 154px; }
    .lens-controls { bottom: 20px; width: min(100% - 24px, 430px); }
    .lens-control { min-height: 35px; padding: 8px 12px; font-size: 10px; }
  }

  @media (max-width: 390px) {
    .lens-controls__primary { gap: 6px; }
    .lens-control { padding-inline: 10px; }
  }
</style>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.1/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

  const MODEL_URL = 'https://raw.githubusercontent.com/wb123321q-cpu/premium-lens-assets/main/3Dlens.glb';
  const TRANSITION_MS = 620;
  const container = document.getElementById('lens-apple-widget');
  const canvas = document.getElementById('lens-apple-canvas');
  const status = document.getElementById('lens-apple-status');
  const dragHint = document.getElementById('drag-hint');
  const photochromeControls = document.getElementById('photochrome-controls');
  const controls = [...document.querySelectorAll('[data-lens-mode]')];

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1f2126); // Графит

  const camera = new THREE.PerspectiveCamera(28, 1, 0.01, 100);
  camera.position.set(0, 0, 6.0);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.35;

  // ==========================================
  // НЕВИДИМАЯ СТУДИЯ СВЕТА И БЛИКОВ
  // ==========================================
  const envScene = new THREE.Scene();
  envScene.background = new THREE.Color(0x101114); 
  
  // Основной мягкий белый блик
  const stripLight = new THREE.Mesh(
    new THREE.PlaneGeometry(0.32, 8.0),
    new THREE.MeshBasicMaterial({ color: 0xffffff, toneMapped: false })
  );
  stripLight.position.set(-3.0, 0.3, 2.2);
  stripLight.lookAt(0, 0, 0);
  envScene.add(stripLight);

  // Цветной остаточный рефлекс (Края)
  const stripEdge = new THREE.Mesh(
    new THREE.PlaneGeometry(0.042, 7.75),
    new THREE.MeshBasicMaterial({ color: 0x00f070, toneMapped: false }) // Изумрудный AR старт
  );
  stripEdge.position.set(-2.805, 0.3, 2.2);
  stripEdge.lookAt(0, 0, 0);
  envScene.add(stripEdge);

  // Контровой свет (Rim Light) для отрыва темных линз от фона
  const rimLight = new THREE.Mesh(
    new THREE.PlaneGeometry(2.0, 8.0),
    new THREE.MeshBasicMaterial({ color: 0xffffff, toneMapped: false })
  );
  rimLight.position.set(4.0, 0.0, -2.5);
  rimLight.lookAt(0, 0, 0);
  envScene.add(rimLight);

  envScene.add(new THREE.AmbientLight(0x40444d)); // Подсветка для темных фотохромов

  const pmrem = new THREE.PMREMGenerator(renderer);
  let environmentTarget = null;
  let lastEnvironmentUpdate = 0;

  function refreshEnvironment(now = 0) {
    if (now && now - lastEnvironmentUpdate < 33) return;
    lastEnvironmentUpdate = now;
    const nextTarget = pmrem.fromScene(envScene, 0.02);
    const previousTarget = environmentTarget;
    environmentTarget = nextTarget;
    scene.environment = nextTarget.texture;
    previousTarget?.dispose();
  }

  refreshEnvironment();

  // ==========================================
  // БАЗОВЫЙ МАТЕРИАЛ (КРИСТАЛЬНАЯ ПОВЕРХНОСТЬ)
  // ВАЖНО: Поверхность всегда белая (#ffffff) для идеального глянца!
  // ==========================================
  const glassMaterial = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,       // Поверхность всегда бесцветная
    transmission: 1.0,     // 100% пропускание
    transparent: true,
    opacity: 1.0,
    roughness: 0.0,
    metalness: 0.0,
    ior: 1.52,
    thickness: 0.6,
    attenuationColor: new THREE.Color(0xffffff), // Цвет внутри массы стекла
    attenuationDistance: 5.0, // Насколько быстро свет поглощается
    clearcoat: 1.0,        // Максимальный полированный блеск
    clearcoatRoughness: 0.0,
    dispersion: 0.012,
    envMapIntensity: 1.2
  });

  // ==========================================
  // НАСТРОЙКИ ПОКРЫТИЙ ПО ФОТО-РЕФЕРЕНСАМ
  // ==========================================
  const coatingPresets = {
    clear: {
      attenuationColor: '#ffffff', attenuationDistance: 5.0, // Кристально чистая
      envMapIntensity: 1.2, stripColor: '#ffffff', stripEdgeColor: '#00f070' // Зеленый AR
    },
    blue: {
      attenuationColor: '#fffae8', attenuationDistance: 4.0, // Легчайший теплый оттенок массы
      envMapIntensity: 1.3, stripColor: '#ffffff', stripEdgeColor: '#3b00ff' // Сочный фиолетово-синий
    },
    'photo-clear': {
      attenuationColor: '#ffffff', attenuationDistance: 5.0,
      envMapIntensity: 1.2, stripColor: '#ffffff', stripEdgeColor: '#00f070'
    },
    'photo-gray': {
      attenuationColor: '#1a1c20', attenuationDistance: 0.35, // Глубокий серый (75%)
      envMapIntensity: 2.5, stripColor: '#ffffff', stripEdgeColor: '#ffffff' // Белый глянец
    },
    'photo-brown': {
      attenuationColor: '#63320b', attenuationDistance: 0.38, // Янтарно-коричневый (как Ray-Ban B-15)
      envMapIntensity: 2.5, stripColor: '#ffe5cc', stripEdgeColor: '#ffba75' // Теплый глянцевый блик
    }
  };

  function color(value) {
    return new THREE.Color(value);
  }

  function snapshotMaterial() {
    return {
      attenuationColor: glassMaterial.attenuationColor.clone(),
      attenuationDistance: glassMaterial.attenuationDistance,
      envMapIntensity: glassMaterial.envMapIntensity,
      stripColor: stripLight.material.color.clone(),
      stripEdgeColor: stripEdge.material.color.clone()
    };
  }

  function normalizePreset(preset) {
    return {
      attenuationColor: color(preset.attenuationColor),
      attenuationDistance: preset.attenuationDistance,
      envMapIntensity: preset.envMapIntensity,
      stripColor: color(preset.stripColor),
      stripEdgeColor: color(preset.stripEdgeColor)
    };
  }

  let coatingTransition = null;

  function setCoating(mode) {
    const target = normalizePreset(coatingPresets[mode]);
    coatingTransition = {
      start: performance.now(),
      from: snapshotMaterial(),
      to: target
    };
  }

  function updateCoating(now) {
    if (!coatingTransition) return;
    const progress = Math.min((now - coatingTransition.start) / TRANSITION_MS, 1);
    const eased = progress * progress * (3 - 2 * progress);
    const { from, to } = coatingTransition;

    // ВАЖНО: Мы больше не меняем glassMaterial.color, только внутренний свет (attenuation)
    glassMaterial.attenuationColor.copy(from.attenuationColor).lerp(to.attenuationColor, eased);
    glassMaterial.attenuationDistance = THREE.MathUtils.lerp(from.attenuationDistance, to.attenuationDistance, eased);
    glassMaterial.envMapIntensity = THREE.MathUtils.lerp(from.envMapIntensity, to.envMapIntensity, eased);
    stripLight.material.color.copy(from.stripColor).lerp(to.stripColor, eased);
    stripEdge.material.color.copy(from.stripEdgeColor).lerp(to.stripEdgeColor, eased);
    refreshEnvironment(now);

    if (progress === 1) coatingTransition = null;
  }

  function updateControlState(mode) {
    const isPhotochrome = mode.startsWith('photo-');
    photochromeControls.classList.toggle('is-visible', isPhotochrome);
    photochromeControls.setAttribute('aria-hidden', String(!isPhotochrome));

    controls.forEach((button) => {
      const buttonMode = button.dataset.lensMode;
      const isPrimaryPhotochrome = button.closest('.lens-controls__primary') && buttonMode === 'photo-clear';
      const isActive = isPrimaryPhotochrome ? isPhotochrome : buttonMode === mode;
      button.classList.toggle('is-active', isActive);
      button.setAttribute('aria-pressed', String(isActive));
    });
  }

  controls.forEach((button) => {
    button.addEventListener('click', () => {
      const mode = button.dataset.lensMode;
      updateControlState(mode);
      setCoating(mode);
    });
  });

  const floatGroup = new THREE.Group();
  const spinGroup = new THREE.Group();
  floatGroup.add(spinGroup);
  scene.add(floatGroup);

  const loader = new GLTFLoader();
  loader.setCrossOrigin('anonymous');
  loader.load(MODEL_URL, (gltf) => {
    const model = gltf.scene;
    const lensMeshes = [];

    model.traverse((object) => {
      if (!object.isMesh) return;
      const name = `${object.name} ${object.parent?.name || ''}`.toLowerCase();
      if (/lens|линз/.test(name)) lensMeshes.push(object);
    });

    const visibleMeshes = lensMeshes.length ? lensMeshes : (() => {
      const all = [];
      model.traverse((object) => { if (object.isMesh) all.push(object); });
      return all;
    })();
    const lensBox = new THREE.Box3();
    visibleMeshes.forEach((mesh) => lensBox.expandByObject(mesh));
    const lensSize = lensBox.getSize(new THREE.Vector3());
    const lensCenter = lensBox.getCenter(new THREE.Vector3());

    const scale = 2.4 / Math.max(lensSize.x, lensSize.y, lensSize.z);
    model.scale.setScalar(scale);
    model.position.set(-lensCenter.x * scale, -lensCenter.y * scale, -lensCenter.z * scale);

    model.traverse((object) => {
      if (!object.isMesh) return;
      const isLens = visibleMeshes.includes(object);
      object.visible = isLens;
      if (isLens) object.material = glassMaterial;
    });

    spinGroup.rotation.x = THREE.MathUtils.degToRad(15);
    spinGroup.rotation.y = THREE.MathUtils.degToRad(25);
    spinGroup.add(model);
    status.style.display = 'none';
  }, undefined, (error) => {
    console.error(error);
    status.textContent = 'Ошибка загрузки модуля.';
  });

  function resize() {
    const { width, height } = container.getBoundingClientRect();
    renderer.setSize(width, height, false);
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
  }
  new ResizeObserver(resize).observe(container);
  resize();

  let isDragging = false;
  let lastPointerX = 0;
  let lastPointerY = 0;
  let targetRotationX = THREE.MathUtils.degToRad(15);
  let targetRotationY = THREE.MathUtils.degToRad(25);

  canvas.addEventListener('pointerdown', (event) => {
    isDragging = true;
    lastPointerX = event.clientX;
    lastPointerY = event.clientY;
    canvas.setPointerCapture(event.pointerId);
    dragHint.style.opacity = '0';
  });

  canvas.addEventListener('pointermove', (event) => {
    if (!isDragging) return;
    targetRotationY += (event.clientX - lastPointerX) * 0.006;
    targetRotationX += (event.clientY - lastPointerY) * 0.006;
    targetRotationX = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, targetRotationX));
    lastPointerX = event.clientX;
    lastPointerY = event.clientY;
  });

  const releasePointer = () => { isDragging = false; };
  canvas.addEventListener('pointerup', releasePointer);
  canvas.addEventListener('pointercancel', releasePointer);

  const clock = new THREE.Clock();
  function render(now) {
    const elapsedTime = clock.getElapsedTime();

    if (!isDragging) targetRotationY += 0.0025;
    spinGroup.rotation.y += (targetRotationY - spinGroup.rotation.y) * 0.05;
    spinGroup.rotation.x += (targetRotationX - spinGroup.rotation.x) * 0.05;
    floatGroup.position.y = Math.sin(elapsedTime * 1.2) * 0.08;

    updateCoating(now);
    renderer.render(scene, camera);
    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);

  window.addEventListener('pagehide', () => {
    environmentTarget?.dispose();
    pmrem.dispose();
    renderer.dispose();
  }, { once: true });
</script>
